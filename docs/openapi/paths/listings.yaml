listings:
  post:
    summary: Create a new listing
    description: Create a new business listing, service, job, event, or request
    tags:
      - Listings
    security:
      - CookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
        application/x-www-form-urlencoded:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
    responses:
      '302':
        description: Redirect to listing detail
        headers:
          Location:
            schema:
              type: string
      '400':
        description: Validation error
      '401':
        description: Unauthorized

fragment:
  get:
    summary: Get listings fragment
    description: Returns HTML fragment for HTMX partial updates
    tags:
      - Public
    parameters:
      - name: type
        in: query
        description: Filter by category
        schema:
          type: string
      - name: q
        in: query
        description: Search term
        schema:
          type: string
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          default: 1
    responses:
      '200':
        description: HTML fragment

single:
  get:
    summary: Get listing details
    description: Returns full details of a specific listing
    tags:
      - Public
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Listing details
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Listing.yaml'
      '404':
        description: Listing not found

  post:
    summary: Update a listing (POST)
    description: Alternative update endpoint for forms
    tags:
      - Listings
    security:
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
        application/x-www-form-urlencoded:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
    responses:
      '302':
        description: Redirect to listing detail
      '401':
        description: Unauthorized
      '404':
        description: Listing not found

  put:
    summary: Update a listing
    description: Update an existing listing
    tags:
      - Listings
    security:
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
        application/x-www-form-urlencoded:
          schema:
            $ref: '../components/schemas/ListingInput.yaml'
    responses:
      '302':
        description: Redirect to listing detail
      '401':
        description: Unauthorized
      '404':
        description: Listing not found

  delete:
    summary: Delete a listing
    description: Delete a listing (owner or admin only)
    tags:
      - Listings
    security:
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '302':
        description: Redirect to home
      '401':
        description: Unauthorized
      '404':
        description: Listing not found

edit:
  get:
    summary: Get edit form
    description: Returns HTML form for editing a listing
    tags:
      - Listings
    security:
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: HTML form
      '401':
        description: Unauthorized
      '404':
        description: Listing not found

claim:
  post:
    summary: Claim a listing
    description: Claim ownership of an unclaimed listing
    tags:
      - Listings
    security:
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '302':
        description: Redirect to profile
      '401':
        description: Unauthorized

profile:
  get:
    summary: Get user profile
    description: Returns the authenticated user's profile and their listings
    tags:
      - Listings
    security:
      - CookieAuth: []
    responses:
      '200':
        description: User profile page
      '401':
        description: Unauthorized

feedback:
  post:
    summary: Submit feedback
    description: Submit user feedback
    tags:
      - Listings
    security:
      - CookieAuth: []
    requestBody:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '../components/schemas/Feedback.yaml'
    responses:
      '200':
        description: Success message HTML
      '400':
        description: Validation error
      '401':
        description: Unauthorized

feedback_modal:
  get:
    summary: Get feedback modal
    description: Returns HTML modal for feedback form
    tags:
      - Listings
    security:
      - CookieAuth: []
    responses:
      '200':
        description: HTML modal
