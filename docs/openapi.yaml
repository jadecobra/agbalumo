openapi: 3.0.3
info:
  title: agbalumo API
  description: |
    REST API for the agbalumo directory platform - a web application for the West African diaspora community.
    
    ## Authentication
    - Session-based authentication using cookies
    - Google OAuth 2.0 for social login
    - CSRF protection required for state-changing operations
    
    ## Rate Limiting
    - Default: 60 requests per minute
    - Admin login: 5 requests per minute
  version: 1.0.0
  contact:
    name: agbalumo Team
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://agbalumo.com
    description: Production server

tags:
  - name: Public
    description: Public endpoints (no auth required)
  - name: Auth
    description: Authentication endpoints
  - name: Listings
    description: User listing operations
  - name: Admin
    description: Administrative operations

paths:
  /:
    get:
      summary: Home page
      description: Returns the homepage with featured listings
      tags:
        - Public
      responses:
        '200':
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /about:
    get:
      summary: About page
      tags:
        - Public
      responses:
        '200':
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /listings:
    $ref: './openapi/paths/listings.yaml#/listings'

  /listings/fragment:
    $ref: './openapi/paths/listings.yaml#/fragment'

  /listings/{id}:
    $ref: './openapi/paths/listings.yaml#/single'

  /listings/{id}/edit:
    $ref: './openapi/paths/listings.yaml#/edit'

  /listings/{id}/claim:
    $ref: './openapi/paths/listings.yaml#/claim'

  /profile:
    $ref: './openapi/paths/listings.yaml#/profile'

  /feedback:
    $ref: './openapi/paths/listings.yaml#/feedback'

  /feedback/modal:
    $ref: './openapi/paths/listings.yaml#/feedback_modal'

  /healthz:
    get:
      summary: Health check
      description: Returns 200 OK if server is running
      tags:
        - Public
      responses:
        '200':
          description: OK

  # Authentication Routes
  /auth/dev:
    $ref: './openapi/paths/auth.yaml#/dev'

  /auth/logout:
    $ref: './openapi/paths/auth.yaml#/logout'

  /auth/google/login:
    $ref: './openapi/paths/auth.yaml#/google_login'

  /auth/google/callback:
    $ref: './openapi/paths/auth.yaml#/google_callback'

  # Admin Routes
  /admin:
    $ref: './openapi/paths/admin.yaml#/dashboard'

  /admin/login:
    $ref: './openapi/paths/admin.yaml#/login'

  /admin/users:
    $ref: './openapi/paths/admin.yaml#/users'

  /admin/listings:
    $ref: './openapi/paths/admin.yaml#/listings'

  /admin/listings/{id}/row:
    $ref: './openapi/paths/admin.yaml#/listings_row'

  /admin/claims/{id}/approve:
    $ref: './openapi/paths/admin.yaml#/claims_approve'

  /admin/claims/{id}/reject:
    $ref: './openapi/paths/admin.yaml#/claims_reject'

  /admin/listings/{id}/featured:
    $ref: './openapi/paths/admin.yaml#/listings_featured'

  /admin/listings/bulk:
    $ref: './openapi/paths/admin.yaml#/listings_bulk'

  /admin/listings/delete-confirm:
    $ref: './openapi/paths/admin.yaml#/listings_delete_confirm'

  /admin/listings/delete:
    $ref: './openapi/paths/admin.yaml#/listings_delete'

  /admin/upload:
    $ref: './openapi/paths/admin.yaml#/upload'

  /admin/listings/export:
    $ref: './openapi/paths/admin.yaml#/listings_export'

  /admin/categories:
    $ref: './openapi/paths/admin.yaml#/categories'

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    Listing:
      type: object
      properties:
        id:
          type: string
          example: "abc123"
        owner_id:
          type: string
          example: "user-456"
        owner_origin:
          type: string
          example: "Nigeria"
        type:
          type: string
          enum: [Business, Service, Product, Food, Event, Job, Request]
          example: "Business"
        anchor:
          type: string
          example: "Professional"
        title:
          type: string
          example: "Lagos Restaurant"
        description:
          type: string
          example: "Authentic Nigerian cuisine"
        city:
          type: string
          example: "Lagos"
        address:
          type: string
          example: "123 Main Street"
        hours_of_operation:
          type: string
          example: "Mon-Fri: 9am-6pm"
        image_url:
          type: string
          example: "/uploads/listing-abc123.jpg"
        contact_email:
          type: string
          format: email
          example: "info@example.com"
        contact_phone:
          type: string
          example: "+2341234567890"
        contact_whatsapp:
          type: string
          example: "+2340987654321"
        website_url:
          type: string
          format: uri
          example: "https://example.com"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        deadline:
          type: string
          format: date-time
        event_start:
          type: string
          format: date-time
        event_end:
          type: string
          format: date-time
        skills:
          type: string
          example: "JavaScript, React, Node.js"
        job_start_date:
          type: string
          format: date-time
        job_apply_url:
          type: string
          format: uri
        company:
          type: string
          example: "Tech Corp"
        pay_range:
          type: string
          example: "$50,000 - $70,000"
        is_active:
          type: boolean
          example: true
        status:
          type: string
          enum: [Pending, Approved, Rejected]
          example: "Approved"
        featured:
          type: boolean
          example: false

    ListingInput:
      type: object
      required:
        - title
        - type
        - owner_origin
        - city
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100

          example: "Lagos Restaurant"
        type:
          type: string
          enum: [Business, Service, Product, Food, Event, Job, Request]
          example: "Business"
        owner_origin:
          type: string
          example: "Nigeria"
        description:
          type: string
          maxLength: 2000
          example: "Authentic Nigerian cuisine"
        city:
          type: string
          example: "Lagos"
        address:
          type: string
          example: "123 Main Street"
        hours_of_operation:
          type: string
          example: "Mon-Fri: 9am-6pm"
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        contact_whatsapp:
          type: string
        website_url:
          type: string
          format: uri
        deadline_date:
          type: string
          format: date
        event_start:
          type: string
          format: date-time
        event_end:
          type: string
          format: date-time
        skills:
          type: string
        job_start_date:
          type: string
          format: date-time
        job_apply_url:
          type: string
          format: uri
        company:
          type: string
        pay_range:
          type: string
        image:
          type: string
          format: binary
        remove_image:
          type: boolean
          description: Set to true to remove existing image

    User:
      type: object
      properties:
        id:
          type: string
          example: "user-123"
        google_id:
          type: string
          example: "google-123456"
        email:
          type: string
          format: email
          example: "user@example.com"
        name:
          type: string
          example: "John Doe"
        avatar_url:
          type: string
          format: uri
        role:
          type: string
          enum: [Admin, User]
          example: "User"
        created_at:
          type: string
          format: date-time

    Feedback:
      type: object
      required:
        - content
      properties:
        type:
          type: string
          enum: [Bug, Feature, Question, Other]
          example: "Bug"
        content:
          type: string
          example: "Great app!"
