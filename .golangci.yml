version: "2"
run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - gosec
    - bodyclose
    - nolintlint
    - errcheck
    - gocognit
    - goconst
    - dupl
    - govet
  settings:
    govet:
      enable:
        - shadow
        - fieldalignment
    gocognit:
      min-complexity: 10
    goconst:
      min-len: 3
      min-occurrences: 3
    dupl:
      threshold: 150
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      config:
        G306: "0600"
    nolintlint:
      allow-unused: true
      allow-no-explanation: []
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - nolintlint
          - dupl
      - path: "internal/seeder/seeder\\.go"
        linters:
          - dupl

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
