# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - gosec
    - bodyclose
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      config:
        G306: "0600" # redundant but safe

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gosec
        - bodyclose
        - errcheck
    - linters:
        - gosec
      text: "G301:"
      path: "scripts/.*|.*_test\\.go"
    - linters:
        - gosec
      text: "G302:"
      path: "scripts/.*|.*_test\\.go"
    - linters:
        - gosec
      text: "G306:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G204:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G304:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G404:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G203:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G402:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G101:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G122:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G702:"
      path: "scripts/|_test\\.go"
    - linters:
        - gosec
      text: "G703:"
      path: "scripts/|_test\\.go"
