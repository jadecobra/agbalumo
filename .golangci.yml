version: "2"
run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - gosec
    - bodyclose
    - nolintlint
    - errcheck
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      config:
        G306: "0600"
    nolintlint:
      allow-unused: true
      allow-no-explanation: []
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - nolintlint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
