{{ template "base.html" . }}

{{ define "content" }}
<div class="container mx-auto px-4 py-8 bg-earth-dark min-h-screen">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-earth-cream">Users</h1>
        <a href="/admin"
            class="px-5 py-2.5 bg-white/10 text-earth-cream rounded-full hover:bg-white/20 transition-all font-bold text-sm flex items-center gap-1 active:scale-95">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back
        </a>
    </div>

    <div
        class="bg-white/5 rounded-3xl shadow-soft border border-white/10 overflow-hidden">
        <div class="overflow-x-auto no-scrollbar">
            <table class="min-w-full divide-y divide-white/10">
                <thead class="bg-white/5">
                    <tr>
                        <th
                            class="px-6 py-4 text-left text-xs font-bold text-earth-cream/70 uppercase tracking-wider">
                            User</th>
                        <th
                            class="px-6 py-4 text-left text-xs font-bold text-earth-cream/70 uppercase tracking-wider">
                            Role</th>
                        <th
                            class="px-6 py-4 text-left text-xs font-bold text-earth-cream/70 uppercase tracking-wider">
                            Joined</th>
                    </tr>
                </thead>
                <tbody class="bg-white/5 divide-y divide-white/10">
                    {{ range .Users }}
                    <tr class="hover:bg-white/10 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-10 w-10 shrink-0">
                                    <img class="h-10 w-10 rounded-full object-cover border border-white/10"
                                        src="{{ if .AvatarURL }}{{ .AvatarURL }}{{ else }}/static/images/default-avatar.png{{ end }}"
                                        alt="{{ .Name }}">
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-bold text-earth-cream">{{ .Name }}</div>
                                    <div class="text-sm text-earth-cream/70">{{ .Email }}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-0.5 inline-flex text-[10px] leading-5 font-bold rounded-full uppercase tracking-wider
                                {{ if eq .Role " Admin" }}bg-purple-100 text-purple-800 dark:bg-purple-900/30
                                dark:text-purple-300 {{ else }}bg-green-100 text-green-800 dark:bg-green-900/30
                                dark:text-green-300{{ end }}">
                                {{ .Role }}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs font-medium text-earth-cream/70">
                            {{ .CreatedAt.Format "Jan 02, 2006" }}
                        </td>
                    </tr>
                    {{ end }}
                </tbody>
            </table>
        </div>
        {{ if not .Users }}
        <div class="p-12 text-center text-earth-cream/70">
            <div class="flex flex-col items-center gap-2">
                <span class="material-symbols-outlined text-4xl opacity-20">group_off</span>
                <p class="font-bold">No users found.</p>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
