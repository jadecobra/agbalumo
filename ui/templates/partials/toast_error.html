<div id="toast-{{ .ID }}" data-toast-auto-dismiss="5000"
    class="fixed top-4 right-4 z-50 max-w-sm w-full bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800  shadow-lg p-4 flex items-start gap-3 animate-in slide-in-from-top-2 fade-in"
    role="alert">
    <span class="material-symbols-outlined text-red-500 text-[20px] mt-0.5">error</span>
    <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-red-800 dark:text-red-200">{{ .Title }}</p>
        <p class="text-sm text-red-600 dark:text-red-300 mt-1">{{ .Message }}</p>
    </div>
    <button hx-on:click="closeToast('toast-{{ .ID }}')"
        class="text-red-400 hover:text-red-600 dark:hover:text-red-200 transition-colors">
        <span class="material-symbols-outlined text-[18px]">close</span>
    </button>
</div>
