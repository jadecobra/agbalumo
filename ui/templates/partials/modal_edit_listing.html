<dialog id="edit-listing-modal-{{.Listing.ID}}"
    class="backdrop:bg-black/50 bg-transparent p-0 w-full max-w-none md:max-w-sm m-0 md:m-auto rounded-none md:rounded-3xl shadow-2xl open:animate-in open:fade-in open:zoom-in-95 backdrop:animate-in backdrop:fade-in fixed md:relative inset-0 md:inset-auto h-full md:h-auto">
    <div
        class="bg-background-light dark:bg-background-dark p-6 rounded-none md:rounded-3xl border-0 md:border border-orange-100 dark:border-stone-800 shadow-soft relative overflow-y-auto h-full md:h-auto md:max-h-[85vh]">
        <!-- Decorative Background -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-3xl -z-10 transform translate-x-10 -translate-y-10">
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-text-main dark:text-white">Edit Listing</h3>
            <button onclick="this.closest('dialog').close(); this.closest('dialog').remove();"
                class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 text-stone-500 transition-colors">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <form hx-put="/listings/{{.Listing.ID}}" hx-swap="outerHTML" hx-target="#listing-{{.Listing.ID}}" method="POST"
            enctype="multipart/form-data" class="flex flex-col gap-4" id="edit-form-{{.Listing.ID}}">

            <!-- Type -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Type</label>
                <select name="type"
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white appearance-none">
                    <option value="Business" {{ if eq .Listing.Type "Business" }}selected{{ end }}>Business</option>
                    <option value="Service" {{ if eq .Listing.Type "Service" }}selected{{ end }}>Service</option>
                    <option value="Product" {{ if eq .Listing.Type "Product" }}selected{{ end }}>Product</option>
                    <option value="Food" {{ if eq .Listing.Type "Food" }}selected{{ end }}>Food (Restaurant/Catering)
                    </option>
                    <option value="Event" {{ if eq .Listing.Type "Event" }}selected{{ end }}>Event</option>
                    <option value="Request" {{ if eq .Listing.Type "Request" }}selected{{ end }}>Request</option>
                </select>
            </div>

            <!-- Title -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Title</label>
                <input required name="title" type="text" value="{{ .Listing.Title }}" placeholder="e.g., Mama's Kitchen"
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
            </div>

            <!-- Origin -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Origin</label>
                <select name="owner_origin"
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white appearance-none">
                    <option value="" disabled>Select Country</option>
                    <optgroup label="West Africa">
                        <option value="Benin" {{ if eq .Listing.OwnerOrigin "Benin" }}selected{{ end }}>Benin 🇧🇯</option>
                        <option value="Burkina Faso" {{ if eq .Listing.OwnerOrigin "Burkina Faso" }}selected{{ end }}>Burkina Faso 🇧🇫</option>
                        <option value="Cabo Verde" {{ if eq .Listing.OwnerOrigin "Cabo Verde" }}selected{{ end }}>Cabo Verde 🇨🇻</option>
                        <option value="Cote d'Ivoire" {{ if eq .Listing.OwnerOrigin "Cote d'Ivoire" }}selected{{ end }}>Côte d'Ivoire 🇨🇮</option>
                        <option value="Gambia" {{ if eq .Listing.OwnerOrigin "Gambia" }}selected{{ end }}>Gambia 🇬🇲</option>
                        <option value="Ghana" {{ if eq .Listing.OwnerOrigin "Ghana" }}selected{{ end }}>Ghana 🇬🇭</option>
                        <option value="Guinea" {{ if eq .Listing.OwnerOrigin "Guinea" }}selected{{ end }}>Guinea 🇬🇳</option>
                        <option value="Guinea-Bissau" {{ if eq .Listing.OwnerOrigin "Guinea-Bissau" }}selected{{ end }}>Guinea-Bissau 🇬🇼</option>
                        <option value="Liberia" {{ if eq .Listing.OwnerOrigin "Liberia" }}selected{{ end }}>Liberia 🇱🇷</option>
                        <option value="Mali" {{ if eq .Listing.OwnerOrigin "Mali" }}selected{{ end }}>Mali 🇲🇱</option>
                        <option value="Mauritania" {{ if eq .Listing.OwnerOrigin "Mauritania" }}selected{{ end }}>Mauritania 🇲🇷</option>
                        <option value="Niger" {{ if eq .Listing.OwnerOrigin "Niger" }}selected{{ end }}>Niger 🇳🇪</option>
                        <option value="Nigeria" {{ if eq .Listing.OwnerOrigin "Nigeria" }}selected{{ end }}>Nigeria 🇳🇬</option>
                        <option value="Senegal" {{ if eq .Listing.OwnerOrigin "Senegal" }}selected{{ end }}>Senegal 🇸🇳</option>
                        <option value="Sierra Leone" {{ if eq .Listing.OwnerOrigin "Sierra Leone" }}selected{{ end }}>Sierra Leone 🇸🇱</option>
                        <option value="Togo" {{ if eq .Listing.OwnerOrigin "Togo" }}selected{{ end }}>Togo 🇹🇬</option>
                    </optgroup>
                    <optgroup label="North Africa">
                        <option value="Algeria" {{ if eq .Listing.OwnerOrigin "Algeria" }}selected{{ end }}>Algeria 🇩🇿</option>
                        <option value="Egypt" {{ if eq .Listing.OwnerOrigin "Egypt" }}selected{{ end }}>Egypt 🇪🇬</option>
                        <option value="Libya" {{ if eq .Listing.OwnerOrigin "Libya" }}selected{{ end }}>Libya 🇱🇾</option>
                        <option value="Morocco" {{ if eq .Listing.OwnerOrigin "Morocco" }}selected{{ end }}>Morocco 🇲🇦</option>
                        <option value="Sudan" {{ if eq .Listing.OwnerOrigin "Sudan" }}selected{{ end }}>Sudan 🇸🇩</option>
                        <option value="Tunisia" {{ if eq .Listing.OwnerOrigin "Tunisia" }}selected{{ end }}>Tunisia 🇹🇳</option>
                        <option value="Western Sahara" {{ if eq .Listing.OwnerOrigin "Western Sahara" }}selected{{ end }}>Western Sahara</option>
                    </optgroup>
                    <optgroup label="East Africa">
                        <option value="Burundi" {{ if eq .Listing.OwnerOrigin "Burundi" }}selected{{ end }}>Burundi 🇧🇮</option>
                        <option value="Comoros" {{ if eq .Listing.OwnerOrigin "Comoros" }}selected{{ end }}>Comoros 🇰🇲</option>
                        <option value="Djibouti" {{ if eq .Listing.OwnerOrigin "Djibouti" }}selected{{ end }}>Djibouti 🇩🇯</option>
                        <option value="Eritrea" {{ if eq .Listing.OwnerOrigin "Eritrea" }}selected{{ end }}>Eritrea 🇪🇷</option>
                        <option value="Ethiopia" {{ if eq .Listing.OwnerOrigin "Ethiopia" }}selected{{ end }}>Ethiopia 🇪🇹</option>
                        <option value="Kenya" {{ if eq .Listing.OwnerOrigin "Kenya" }}selected{{ end }}>Kenya 🇰🇪</option>
                        <option value="Madagascar" {{ if eq .Listing.OwnerOrigin "Madagascar" }}selected{{ end }}>Madagascar 🇲🇬</option>
                        <option value="Malawi" {{ if eq .Listing.OwnerOrigin "Malawi" }}selected{{ end }}>Malawi 🇲🇼</option>
                        <option value="Mauritius" {{ if eq .Listing.OwnerOrigin "Mauritius" }}selected{{ end }}>Mauritius 🇲🇺</option>
                        <option value="Mozambique" {{ if eq .Listing.OwnerOrigin "Mozambique" }}selected{{ end }}>Mozambique 🇲🇿</option>
                        <option value="Rwanda" {{ if eq .Listing.OwnerOrigin "Rwanda" }}selected{{ end }}>Rwanda 🇷🇼</option>
                        <option value="Seychelles" {{ if eq .Listing.OwnerOrigin "Seychelles" }}selected{{ end }}>Seychelles 🇸🇨</option>
                        <option value="Somalia" {{ if eq .Listing.OwnerOrigin "Somalia" }}selected{{ end }}>Somalia 🇸🇴</option>
                        <option value="South Sudan" {{ if eq .Listing.OwnerOrigin "South Sudan" }}selected{{ end }}>South Sudan 🇸🇸</option>
                        <option value="Tanzania" {{ if eq .Listing.OwnerOrigin "Tanzania" }}selected{{ end }}>Tanzania 🇹🇿</option>
                        <option value="Uganda" {{ if eq .Listing.OwnerOrigin "Uganda" }}selected{{ end }}>Uganda 🇺🇬</option>
                        <option value="Zambia" {{ if eq .Listing.OwnerOrigin "Zambia" }}selected{{ end }}>Zambia 🇿🇲</option>
                        <option value="Zimbabwe" {{ if eq .Listing.OwnerOrigin "Zimbabwe" }}selected{{ end }}>Zimbabwe 🇿🇼</option>
                    </optgroup>
                    <optgroup label="Central Africa">
                        <option value="Angola" {{ if eq .Listing.OwnerOrigin "Angola" }}selected{{ end }}>Angola 🇦🇴</option>
                        <option value="Cameroon" {{ if eq .Listing.OwnerOrigin "Cameroon" }}selected{{ end }}>Cameroon 🇨🇲</option>
                        <option value="Central African Republic" {{ if eq .Listing.OwnerOrigin "Central African Republic" }}selected{{ end }}>Central African Republic 🇨🇫</option>
                        <option value="Chad" {{ if eq .Listing.OwnerOrigin "Chad" }}selected{{ end }}>Chad 🇹🇩</option>
                        <option value="Congo" {{ if eq .Listing.OwnerOrigin "Congo" }}selected{{ end }}>Congo 🇨🇬</option>
                        <option value="Democratic Republic of the Congo" {{ if eq .Listing.OwnerOrigin "Democratic Republic of the Congo" }}selected{{ end }}>DRC 🇨🇩</option>
                        <option value="Equatorial Guinea" {{ if eq .Listing.OwnerOrigin "Equatorial Guinea" }}selected{{ end }}>Equatorial Guinea 🇬🇶</option>
                        <option value="Gabon" {{ if eq .Listing.OwnerOrigin "Gabon" }}selected{{ end }}>Gabon 🇬🇦</option>
                        <option value="Sao Tome and Principe" {{ if eq .Listing.OwnerOrigin "Sao Tome and Principe" }}selected{{ end }}>São Tomé and Príncipe 🇸🇹</option>
                    </optgroup>
                    <optgroup label="Southern Africa">
                        <option value="Botswana" {{ if eq .Listing.OwnerOrigin "Botswana" }}selected{{ end }}>Botswana 🇧🇼</option>
                        <option value="Eswatini" {{ if eq .Listing.OwnerOrigin "Eswatini" }}selected{{ end }}>Eswatini 🇸🇿</option>
                        <option value="Lesotho" {{ if eq .Listing.OwnerOrigin "Lesotho" }}selected{{ end }}>Lesotho 🇱🇸</option>
                        <option value="Namibia" {{ if eq .Listing.OwnerOrigin "Namibia" }}selected{{ end }}>Namibia 🇳🇦</option>
                        <option value="South Africa" {{ if eq .Listing.OwnerOrigin "South Africa" }}selected{{ end }}>South Africa 🇿🇦</option>
                    </optgroup>
                    <option value="Other" {{ if eq .Listing.OwnerOrigin "Other" }}selected{{ end }}>Other 🌍</option>
                </select>
            </div>

            <!-- Image Upload -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Photo
                    (Optional)</label>
                <div id="edit-image-preview-container-{{.Listing.ID}}" class="hidden relative mb-2">
                    <img id="edit-image-preview-{{.Listing.ID}}" class="h-24 w-24 object-cover rounded-xl border border-stone-200" alt="Preview">
                    <button type="button" onclick="removeEditImage('{{.Listing.ID}}')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600">
                        <span class="material-symbols-outlined text-[16px]">close</span>
                    </button>
                </div>
                {{ if .Listing.ImageURL }}
                <div id="edit-existing-image-{{.Listing.ID}}" class="mb-2">
                    <img src="{{ .Listing.ImageURL }}"
                        class="h-24 w-24 object-cover rounded-xl border border-stone-200">
                    <button type="button" onclick="clearEditImage('{{.Listing.ID}}')" class="mt-1 text-xs text-red-500 hover:text-red-700">Remove</button>
                </div>
                {{ end }}
                <input name="image" type="file" accept="image/*" id="edit-image-input-{{.Listing.ID}}"
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition-all text-text-sub">
            </div>

            <!-- Description -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Description</label>
                <textarea required name="description" rows="3" placeholder="Tell us about your listing..."
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white resize-none">{{ .Listing.Description }}</textarea>
            </div>

            <!-- Request Deadline (Hidden by default unless Request) -->
            <div id="edit-request-section-{{.Listing.ID}}" class="flex flex-col gap-1.5 hidden">
                <label
                    class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Deadline</label>
                <input name="deadline_date" type="date"
                    value="{{ if not .Listing.Deadline.IsZero }}{{ .Listing.Deadline.Format " 2006-01-02" }}{{ end }}"
                    class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
            </div>

            <!-- Job Details (Hidden by default unless Job) -->
            <div id="edit-job-section-{{.Listing.ID}}" class="flex flex-col gap-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Company</label>
                        <input name="company" type="text" value="{{ .Listing.Company }}" placeholder="Company Name"
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Pay
                            Range</label>
                        <input name="pay_range" type="text" value="{{ .Listing.PayRange }}"
                            placeholder="e.g. 150k-200k / yr"
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Skills</label>
                    <input name="skills" type="text" value="{{ .Listing.Skills }}"
                        placeholder="e.g. Golang, SQL, Docker"
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Start
                            Date</label>
                        <input name="job_start_date" type="datetime-local"
                            value='{{ if not .Listing.JobStartDate.IsZero }}{{ .Listing.JobStartDate.Format "2006-01-02T15:04" }}{{ end }}'
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Apply
                            URL</label>
                        <input name="job_apply_url" type="url" value="{{ .Listing.JobApplyURL }}"
                            placeholder="https://..."
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                    </div>
                </div>
            </div>

            <!-- Event Dates (Hidden by default unless Event) -->
            <div id="edit-event-dates-section-{{.Listing.ID}}" class="grid grid-cols-2 gap-4 hidden">
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Event
                        Start</label>
                    <input name="event_start" type="datetime-local"
                        value='{{ if not .Listing.EventStart.IsZero }}{{ .Listing.EventStart.Format "2006-01-02T15:04" }}{{ end }}'
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Event
                        End</label>
                    <input name="event_end" type="datetime-local"
                        value='{{ if not .Listing.EventEnd.IsZero }}{{ .Listing.EventEnd.Format "2006-01-02T15:04" }}{{ end }}'
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text-main dark:text-white placeholder:text-stone-400">
                </div>
            </div>

            <!-- Neighborhood -->
            <!-- Location Section -->
            <div class="grid grid-cols-1 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Address
                        (Validated)</label>
                    <input id="edit-address-input-{{.Listing.ID}}" name="address" type="text"
                        value="{{ .Listing.Address }}" placeholder="Start typing address..."
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                    <input type="hidden" id="edit-city-input-{{.Listing.ID}}" name="city" value="{{ .Listing.City }}">
                    <div class="h-full w-full bg-center bg-cover rounded-xl dynamic-bg"
                        data-bg-image="{{.Listing.ImageURL}}" data-alt="{{ .Listing.Title }}">
                    </div>
                </div>

                <!-- Hours of Operation (Optional) -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Hours
                        of Operation</label>
                    <input name="hours_of_operation" type="text" value="{{ .Listing.HoursOfOperation }}"
                        placeholder="e.g. Mon-Fri 9am-6pm"
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                </div>

                <!-- Contact Section -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Email</label>
                        <input name="contact_email" type="email" value="{{ .Listing.ContactEmail }}"
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Phone</label>
                        <input name="contact_phone" type="tel" value="{{ .Listing.ContactPhone }}"
                            class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">WhatsApp</label>
                    <input name="contact_whatsapp" type="tel" value="{{ .Listing.ContactWhatsApp }}"
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                </div>

                <!-- Website (Optional) -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-xs font-bold uppercase tracking-wider text-text-sub dark:text-stone-400 ml-1">Website
                        (Optional)</label>
                    <input name="website_url" type="url" value="{{ .Listing.WebsiteURL }}"
                        class="w-full bg-white dark:bg-surface-dark border border-stone-200 dark:border-stone-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-stone-400 text-text-main dark:text-white">
                </div>

                <button type="submit"
                    class="mt-2 w-full flex items-center justify-center gap-2 bg-primary hover:bg-orange-600 text-white font-bold h-12 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-orange-500/20">
                    Save Changes
                </button>
        </form>
    </div>
</dialog>
</dialog>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var listingId = '{{.Listing.ID}}';
    if (listingId) {
        initEditTypeToggle(listingId);
        initEditMaps(listingId);
        initEditImagePreview(listingId);
    }
});
</script>
