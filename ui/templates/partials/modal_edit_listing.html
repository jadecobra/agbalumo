{{ define "modal_edit_listing" }}
<dialog id="edit-listing-modal-{{.Listing.ID}}"
    class="backdrop:bg-black/50 bg-transparent p-0 w-full max-w-none md:max-w-sm m-auto  shadow-2xl open:animate-in open:fade-in open:zoom-in-95 backdrop:animate-in backdrop:fade-in fixed inset-0 h-full md:h-auto"
    data-auto-open="true" data-listing-id="{{.Listing.ID}}">
    <div
        class="bg-earth-dark/95 backdrop-blur-xl border border-white/10 p-6  shadow-2xl relative overflow-y-auto h-full md:h-auto md:max-h-[85vh]">
        <!-- Decorative Background -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-earth-accent/10 blur-3xl -z-10 transform translate-x-10 -translate-y-10">
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-earth-cream font-serif">Edit Listing</h3>
            <button data-modal-action="close"
                class="p-2 hover:bg-stone-100 dark:hover:bg-stone-800 text-stone-500 transition-colors">
                <span class="material-symbols-outlined text-[20px]">close</span>
                <span class="sr-only">Close</span>
            </button>
        </div>

        <form hx-put="/listings/{{.Listing.ID}}" hx-swap="outerHTML" hx-target="#listing-{{.Listing.ID}}" method="POST"
            enctype="multipart/form-data" class="flex flex-col gap-4" id="edit-form-{{.Listing.ID}}">

            <!-- Type -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Type</label>
                <div class="bg-earth-sand/10 border border-white/20 p-1 relative flex items-center">
                    <select name="type"
                        class="w-full bg-transparent border-none px-4 py-3 h-12 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 appearance-none">
                        {{ range .Categories }}
                        <option value="{{ .Name }}" {{ if eq $.Listing.Type .Name }}selected{{ end }}
                            class="bg-earth-dark text-white">{{ .Name }}</option>
                        {{ end }}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white/50">
                        <span class="material-symbols-outlined text-[20px]">expand_more</span>
                    </div>
                </div>
            </div>

            <!-- Title -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Title</label>
                <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                    <input required name="title" type="text" value="{{ .Listing.Title }}"
                        placeholder="e.g., Mama's Kitchen"
                        class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                </div>
            </div>

            <!-- Origin -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Origin</label>
                <div class="bg-earth-sand/10 border border-white/20 p-1 relative flex items-center">
                    <select name="owner_origin"
                        class="w-full bg-transparent border-none px-4 py-3 h-12 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 appearance-none">
                        <option value="" disabled class="bg-earth-dark text-white">Select Country</option>
                        <optgroup label="West Africa" class="bg-earth-dark text-white font-bold">
                            <option value="Benin" {{ if eq .Listing.OwnerOrigin "Benin" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Benin 🇧🇯
                            </option>
                            <option value="Burkina Faso" {{ if eq .Listing.OwnerOrigin "Burkina Faso" }}selected{{ end
                                }} class="bg-earth-dark text-white font-normal">
                                Burkina Faso 🇧🇫</option>
                            <option value="Cabo Verde" {{ if eq .Listing.OwnerOrigin "Cabo Verde" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Cabo
                                Verde 🇨🇻</option>
                            <option value="Cote d'Ivoire" {{ if eq .Listing.OwnerOrigin "Cote d'Ivoire" }}selected{{ end
                                }} class="bg-earth-dark text-white font-normal">
                                Côte d'Ivoire 🇨🇮</option>
                            <option value="Gambia" {{ if eq .Listing.OwnerOrigin "Gambia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Gambia 🇬🇲
                            </option>
                            <option value="Ghana" {{ if eq .Listing.OwnerOrigin "Ghana" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Ghana 🇬🇭
                            </option>
                            <option value="Guinea" {{ if eq .Listing.OwnerOrigin "Guinea" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Guinea 🇬🇳
                            </option>
                            <option value="Guinea-Bissau" {{ if eq .Listing.OwnerOrigin "Guinea-Bissau" }}selected{{ end
                                }} class="bg-earth-dark text-white font-normal">
                                Guinea-Bissau 🇬🇼</option>
                            <option value="Liberia" {{ if eq .Listing.OwnerOrigin "Liberia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Liberia 🇱🇷
                            </option>
                            <option value="Mali" {{ if eq .Listing.OwnerOrigin "Mali" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Mali 🇲🇱</option>
                            <option value="Mauritania" {{ if eq .Listing.OwnerOrigin "Mauritania" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                Mauritania 🇲🇷</option>
                            <option value="Niger" {{ if eq .Listing.OwnerOrigin "Niger" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Niger 🇳🇪
                            </option>
                            <option value="Nigeria" {{ if eq .Listing.OwnerOrigin "Nigeria" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Nigeria 🇳🇬
                            </option>
                            <option value="Senegal" {{ if eq .Listing.OwnerOrigin "Senegal" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Senegal 🇸🇳
                            </option>
                            <option value="Sierra Leone" {{ if eq .Listing.OwnerOrigin "Sierra Leone" }}selected{{ end
                                }} class="bg-earth-dark text-white font-normal">
                                Sierra Leone 🇸🇱</option>
                            <option value="Togo" {{ if eq .Listing.OwnerOrigin "Togo" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Togo 🇹🇬</option>
                        </optgroup>
                        <optgroup label="North Africa" class="bg-earth-dark text-white font-bold">
                            <option value="Algeria" {{ if eq .Listing.OwnerOrigin "Algeria" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Algeria 🇩🇿
                            </option>
                            <option value="Egypt" {{ if eq .Listing.OwnerOrigin "Egypt" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Egypt 🇪🇬
                            </option>
                            <option value="Libya" {{ if eq .Listing.OwnerOrigin "Libya" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Libya 🇱🇾
                            </option>
                            <option value="Morocco" {{ if eq .Listing.OwnerOrigin "Morocco" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Morocco 🇲🇦
                            </option>
                            <option value="Sudan" {{ if eq .Listing.OwnerOrigin "Sudan" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Sudan 🇸🇩
                            </option>
                            <option value="Tunisia" {{ if eq .Listing.OwnerOrigin "Tunisia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Tunisia 🇹🇳
                            </option>
                            <option value="Western Sahara" {{ if eq .Listing.OwnerOrigin "Western Sahara" }}selected{{
                                end }} class="bg-earth-dark text-white font-normal">Western Sahara</option>
                        </optgroup>
                        <optgroup label="East Africa" class="bg-earth-dark text-white font-bold">
                            <option value="Burundi" {{ if eq .Listing.OwnerOrigin "Burundi" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Burundi 🇧🇮
                            </option>
                            <option value="Comoros" {{ if eq .Listing.OwnerOrigin "Comoros" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Comoros 🇰🇲
                            </option>
                            <option value="Djibouti" {{ if eq .Listing.OwnerOrigin "Djibouti" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Djibouti
                                🇩🇯</option>
                            <option value="Eritrea" {{ if eq .Listing.OwnerOrigin "Eritrea" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Eritrea 🇪🇷
                            </option>
                            <option value="Ethiopia" {{ if eq .Listing.OwnerOrigin "Ethiopia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Ethiopia
                                🇪🇹</option>
                            <option value="Kenya" {{ if eq .Listing.OwnerOrigin "Kenya" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Kenya 🇰🇪
                            </option>
                            <option value="Madagascar" {{ if eq .Listing.OwnerOrigin "Madagascar" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                Madagascar 🇲🇬</option>
                            <option value="Malawi" {{ if eq .Listing.OwnerOrigin "Malawi" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Malawi 🇲🇼
                            </option>
                            <option value="Mauritius" {{ if eq .Listing.OwnerOrigin "Mauritius" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                Mauritius 🇲🇺</option>
                            <option value="Mozambique" {{ if eq .Listing.OwnerOrigin "Mozambique" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                Mozambique 🇲🇿</option>
                            <option value="Rwanda" {{ if eq .Listing.OwnerOrigin "Rwanda" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Rwanda 🇷🇼
                            </option>
                            <option value="Seychelles" {{ if eq .Listing.OwnerOrigin "Seychelles" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                Seychelles 🇸🇨</option>
                            <option value="Somalia" {{ if eq .Listing.OwnerOrigin "Somalia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Somalia 🇸🇴
                            </option>
                            <option value="South Sudan" {{ if eq .Listing.OwnerOrigin "South Sudan" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">
                                South Sudan 🇸🇸</option>
                            <option value="Tanzania" {{ if eq .Listing.OwnerOrigin "Tanzania" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Tanzania
                                🇹🇿</option>
                            <option value="Uganda" {{ if eq .Listing.OwnerOrigin "Uganda" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Uganda 🇺🇬
                            </option>
                            <option value="Zambia" {{ if eq .Listing.OwnerOrigin "Zambia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Zambia 🇿🇲
                            </option>
                            <option value="Zimbabwe" {{ if eq .Listing.OwnerOrigin "Zimbabwe" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Zimbabwe
                                🇿🇼</option>
                        </optgroup>
                        <optgroup label="Central Africa" class="bg-earth-dark text-white font-bold">
                            <option value="Angola" {{ if eq .Listing.OwnerOrigin "Angola" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Angola 🇦🇴
                            </option>
                            <option value="Cameroon" {{ if eq .Listing.OwnerOrigin "Cameroon" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Cameroon
                                🇨🇲</option>
                            <option value="Central African Republic" {{ if eq
                                .Listing.OwnerOrigin "Central African Republic" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Central African Republic
                                🇨🇫</option>
                            <option value="Chad" {{ if eq .Listing.OwnerOrigin "Chad" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Chad 🇹🇩</option>
                            <option value="Congo" {{ if eq .Listing.OwnerOrigin "Congo" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Congo 🇨🇬
                            </option>
                            <option value="Democratic Republic of the Congo" {{ if eq
                                .Listing.OwnerOrigin "Democratic Republic of the Congo" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">DRC 🇨🇩
                            </option>
                            <option value="Equatorial Guinea" {{ if eq .Listing.OwnerOrigin "Equatorial Guinea"
                                }}selected{{ end }} class="bg-earth-dark text-white font-normal">Equatorial Guinea 🇬🇶
                            </option>
                            <option value="Gabon" {{ if eq .Listing.OwnerOrigin "Gabon" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Gabon 🇬🇦
                            </option>
                            <option value="Sao Tome and Principe" {{ if eq .Listing.OwnerOrigin "Sao Tome and Principe"
                                }}selected{{ end }} class="bg-earth-dark text-white font-normal">São Tomé and Príncipe
                                🇸🇹</option>
                        </optgroup>
                        <optgroup label="Southern Africa" class="bg-earth-dark text-white font-bold">
                            <option value="Botswana" {{ if eq .Listing.OwnerOrigin "Botswana" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Botswana
                                🇧🇼</option>
                            <option value="Eswatini" {{ if eq .Listing.OwnerOrigin "Eswatini" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Eswatini
                                🇸🇿</option>
                            <option value="Lesotho" {{ if eq .Listing.OwnerOrigin "Lesotho" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Lesotho 🇱🇸
                            </option>
                            <option value="Namibia" {{ if eq .Listing.OwnerOrigin "Namibia" }}selected{{ end }}
                                class="bg-earth-dark text-white font-normal">Namibia 🇳🇦
                            </option>
                            <option value="South Africa" {{ if eq .Listing.OwnerOrigin "South Africa" }}selected{{ end
                                }} class="bg-earth-dark text-white font-normal">
                                South Africa 🇿🇦</option>
                        </optgroup>
                        <option value="Other" {{ if eq .Listing.OwnerOrigin "Other" }}selected{{ end }}
                            class="bg-earth-dark text-white font-normal">Other 🌍</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white/50">
                        <span class="material-symbols-outlined text-[20px]">expand_more</span>
                    </div>
                </div>
            </div>

            <!-- Image Upload -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Photo
                    (Optional)</label>
                <input type="hidden" name="remove_image" id="remove-image-{{.Listing.ID}}" value="false">
                <div id="edit-image-preview-container-{{.Listing.ID}}" class="hidden relative mb-2">
                    <img id="edit-image-preview-{{.Listing.ID}}" class="h-24 w-24 object-cover border border-white/20"
                        alt="Preview">
                    <button type="button" hx-on:click="removeEditImagePreview('{{.Listing.ID}}')"
                        class="absolute -top-2 -right-2 bg-earth-ochre text-earth-dark p-1 hover:bg-earth-ochre-light shadow-lg">
                        <span class="material-symbols-outlined text-[16px]">close</span>
                    </button>
                </div>
                {{ if .Listing.ImageURL }}
                <div id="edit-existing-image-{{.Listing.ID}}" class="mb-2 relative inline-block">
                    <img src="{{ .Listing.ImageURL }}" class="h-24 w-24 object-cover border border-white/20">
                    <button type="button" hx-on:click="clearEditImage('{{.Listing.ID}}')"
                        class="absolute -top-2 -right-2 bg-earth-ochre text-earth-dark p-1 hover:bg-earth-ochre-light shadow-lg">
                        <span class="material-symbols-outlined text-[16px]">close</span>
                    </button>
                </div>
                {{ end }}
                <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                    <input name="image" type="file" accept="image/*" id="edit-image-input-{{.Listing.ID}}"
                        class="w-full text-white font-light text-sm file:mr-3 file:py-3 file:px-6 file: file:border-0 file:text-[10px] file:uppercase file:tracking-widest file:font-bold file:bg-white/10 file:text-white hover:file:bg-white/20 transition-all cursor-pointer bg-transparent py-1 pl-1 outline-none">
                </div>
            </div>

            <!-- Description -->
            <div class="flex flex-col gap-1.5">
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Description</label>
                <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                    <textarea required name="description" rows="3" placeholder="Tell us about your listing..."
                        class="w-full bg-transparent border-none px-4 py-3 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 resize-none">{{ .Listing.Description }}</textarea>
                </div>
            </div>

            <!-- Request Deadline (Hidden by default unless Request) -->
            <div id="edit-request-section-{{.Listing.ID}}" class="flex flex-col gap-1.5 hidden">
                <label
                    class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Deadline</label>
                <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                    <input name="deadline_date" type="date"
                        value="{{ if not .Listing.Deadline.IsZero }}{{ .Listing.Deadline.Format " 2006-01-02" }}{{ end
                        }}"
                        class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-sm md:text-base outline-none transition-all placeholder:text-white/50 color-scheme-dark">
                </div>
            </div>

            <!-- Job Details (Hidden by default unless Job) -->
            <div id="edit-job-section-{{.Listing.ID}}" class="flex flex-col gap-4 hidden">
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Company</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="company" type="text" value="{{ .Listing.Company }}" placeholder="Company Name"
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Pay
                        Range</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="pay_range" type="text" value="{{ .Listing.PayRange }}"
                            placeholder="e.g. 150k-200k / yr"
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Skills</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <textarea name="skills" rows="2" placeholder="e.g. Golang, SQL, Docker..."
                            class="w-full bg-transparent border-none px-4 py-3 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 resize-none">{{ .Listing.Skills }}</textarea>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Start
                            Date</label>
                        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                            <input name="job_start_date" type="datetime-local"
                                value='{{ if not .Listing.JobStartDate.IsZero }}{{ .Listing.JobStartDate.Format "2006-01-02T15:04" }}{{ end }}'
                                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-sm md:text-base outline-none transition-all placeholder:text-white/50 color-scheme-dark">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Apply
                            URL</label>
                        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                            <input name="job_apply_url" type="text" inputmode="url" value="{{ .Listing.JobApplyURL }}"
                                placeholder="https://..."
                                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Event Dates (Hidden by default unless Event) -->
            <div id="edit-event-dates-section-{{.Listing.ID}}" class="grid grid-cols-2 gap-4 hidden">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Event
                        Start</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="event_start" type="datetime-local"
                            value='{{ if not .Listing.EventStart.IsZero }}{{ .Listing.EventStart.Format "2006-01-02T15:04" }}{{ end }}'
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-sm md:text-base outline-none transition-all placeholder:text-white/50 color-scheme-dark">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Event
                        End</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="event_end" type="datetime-local"
                            value='{{ if not .Listing.EventEnd.IsZero }}{{ .Listing.EventEnd.Format "2006-01-02T15:04" }}{{ end }}'
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-sm md:text-base outline-none transition-all placeholder:text-white/50 color-scheme-dark">
                    </div>
                </div>
            </div>

            <!-- Neighborhood -->
            <!-- Location Section -->
            <div class="grid grid-cols-1 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Address
                        (Validated)</label>
                    <div
                        class="bg-earth-sand/10 border border-white/20 p-1 flex flex-col relative w-full overflow-hidden">
                        <input id="edit-address-input-{{.Listing.ID}}" name="address" type="text"
                            value="{{ .Listing.Address }}" placeholder="Start typing address..."
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 truncate">
                    </div>
                    <input type="hidden" id="edit-city-input-{{.Listing.ID}}" name="city" value="{{ .Listing.City }}">
                </div>

                <!-- Hours of Operation (Optional) -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Hours
                        of Operation</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="hours_of_operation" type="text" value="{{ .Listing.HoursOfOperation }}"
                            placeholder="e.g. Mon-Fri 9am-6pm"
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                    </div>
                </div>

                <!-- Contact Section -->
                <div class="flex flex-col gap-5">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Email</label>
                        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                            <input name="contact_email" type="email" value="{{ .Listing.ContactEmail }}"
                                placeholder="Email"
                                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Phone</label>
                        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                            <input name="contact_phone" type="tel" value="{{ .Listing.ContactPhone }}"
                                placeholder="+1..."
                                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">WhatsApp</label>
                        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                            <input name="contact_whatsapp" type="tel" value="{{ .Listing.ContactWhatsApp }}"
                                placeholder="+1..."
                                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                        </div>
                    </div>
                </div>

                <!-- Website (Optional) -->
                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Website
                        (Optional)</label>
                    <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                        <input name="website_url" type="text" inputmode="url" value="{{ .Listing.WebsiteURL }}"
                            placeholder="https://..."
                            class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
                    </div>
                </div>

                <button type="submit"
                    class="mt-2 w-full flex items-center justify-center gap-2 bg-earth-accent hover:bg-earth-accent/90 text-white font-bold h-12 transition-all active:scale-[0.98] shadow-lg shadow-black/20">
                    Save Changes
                </button>

                <!-- CLOSE button — large touch target for mobile -->
                <button type="button" data-modal-action="close"
                    class="w-full bg-earth-ochre hover:bg-earth-ochre-light text-earth-dark font-bold uppercase text-xs tracking-widest py-4 transition-colors active:scale-95">
                    CLOSE
                </button>
        </form>
    </div>
</dialog>

{{ end }}
