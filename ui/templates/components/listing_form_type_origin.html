{{ define "listing_form_type_origin" }}
<!-- Type -->
<div class="flex flex-col gap-1.5 z-20">
    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Type</label>
    <div class="custom-dropdown relative w-full" style="z-index: 10;">
        <input type="hidden" name="type" value="{{ if .SelectedType }}{{ .SelectedType }}{{ else }}Business{{ end }}" required>
        <button type="button" data-dropdown-toggle
            class="w-full bg-earth-sand/10 border border-white/20 px-4 py-3 h-12 flex justify-between items-center text-white font-light text-base outline-none transition-all placeholder:text-white/50 cursor-pointer">
            <span class="dropdown-display pointer-events-none">{{ if .SelectedType }}{{ .SelectedType }}{{ else }}Business{{ end }}</span>
            <span class="material-symbols-outlined text-[20px] text-white/50 pointer-events-none">expand_more</span>
        </button>
        <div class="dropdown-menu hidden absolute top-full left-0 w-full mt-1 bg-earth-sand border-[3px] border-earth-ochre text-earth-dark shadow-2xl z-50 max-h-60 overflow-y-auto">
            {{ range .Categories }}
            <button type="button" data-dropdown-value="{{ .Name }}"
                class="w-full text-left px-5 py-3 text-[10px] font-bold uppercase tracking-widest transition-colors border-b border-earth-dark/5 cursor-pointer {{ if eq $.SelectedType .Name }}bg-earth-ochre text-white{{ else }}bg-earth-dark/5 hover:bg-earth-dark/10 text-earth-dark{{ end }}">
                {{ .Name }}
            </button>
            {{ end }}
        </div>
    </div>
</div>

<!-- Origin -->
<div class="flex flex-col gap-1.5 z-10 mt-1">
    <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Origin</label>
    <div class="custom-dropdown relative w-full" style="z-index: 10;">
        <input type="hidden" name="owner_origin" value="{{ if .SelectedOrigin }}{{ .SelectedOrigin }}{{ else }}Nigeria{{ end }}" required>
        <button type="button" data-dropdown-toggle
            class="w-full bg-earth-sand/10 border border-white/20 px-4 py-3 h-12 flex justify-between items-center text-white font-light text-base outline-none transition-all placeholder:text-white/50 cursor-pointer">
            <span class="dropdown-display pointer-events-none">{{ if .SelectedOrigin }}{{ .SelectedOrigin }}{{ else }}Nigeria{{ end }}</span>
            <span class="material-symbols-outlined text-[20px] text-white/50 pointer-events-none">expand_more</span>
        </button>
        <div class="dropdown-menu hidden absolute top-full left-0 w-full mt-1 bg-earth-sand border-[3px] border-earth-ochre text-earth-dark shadow-2xl z-50 max-h-60 overflow-y-auto">
            {{ template "custom_country_options" dict "Selected" .SelectedOrigin }}
        </div>
    </div>
</div>
{{ end }}
