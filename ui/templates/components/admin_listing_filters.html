{{ define "admin_listing_filters" }}
<div
    class="bg-earth-sand shadow-soft py-4 px-6 mb-8 border-l-[6px] border-earth-ochre flex flex-wrap gap-2 items-center">
    <a href="/admin/listings"
        class="px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition-all border {{ if not .Category }}bg-earth-ochre text-earth-dark border-earth-ochre shadow-sm{{ else }}bg-earth-dark/5 text-earth-dark/70 border-earth-dark/10 hover:border-earth-ochre hover:text-earth-ochre{{ end }}">All
        ({{.TotalCount}})</a>
    {{ range .Categories }}
    <a href="/admin/listings?category={{ .Name }}"
        class="px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition-all border {{ if eq $.Category .Name }}bg-earth-ochre text-earth-dark border-earth-ochre shadow-sm{{ else }}bg-earth-dark/5 text-earth-dark/70 border-earth-dark/10 hover:border-earth-ochre hover:text-earth-ochre{{ end }}">{{
        .Name }}
        ({{index $.Counts .Name}})</a>
    {{ end }}
</div>
{{ end }}
