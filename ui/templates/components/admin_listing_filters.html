{{ define "admin_listing_filters" }}
<div class="bg-earth-sand shadow-soft py-4 px-6 mb-8 border-l-[6px] border-earth-ochre flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div class="flex flex-wrap gap-2 items-center">
        <a href="/admin/listings"
            class="px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition-all border {{ if not .Category }}bg-earth-ochre text-earth-dark border-earth-ochre shadow-sm{{ else }}bg-earth-dark/5 text-earth-dark/70 border-earth-dark/10 hover:border-earth-ochre hover:text-earth-ochre{{ end }}">All
            ({{.TotalCount}})</a>
        {{ range .Categories }}
        <a href="/admin/listings?category={{ .Name }}{{ if $.QueryText }}&q={{ $.QueryText }}{{ end }}"
            class="px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition-all border {{ if eq $.Category .Name }}bg-earth-ochre text-earth-dark border-earth-ochre shadow-sm{{ else }}bg-earth-dark/5 text-earth-dark/70 border-earth-dark/10 hover:border-earth-ochre hover:text-earth-ochre{{ end }}">{{
            .Name }}
            ({{index $.Counts .Name}})</a>
        {{ end }}
    </div>
    
    <div class="w-full md:w-auto">
        <form action="/admin/listings" method="GET" class="flex w-full md:w-64 max-w-md relative">
            {{ if .Category }}
            <input type="hidden" name="category" value="{{ .Category }}">
            {{ end }}
            <div class="relative w-full">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-earth-dark/60">
                    <span class="material-symbols-outlined text-[18px]">search</span>
                </div>
                <input type="text" name="q" placeholder="Search..." value="{{ .QueryText }}"
                    class="block w-full pl-10 pr-3 py-2 border border-earth-dark/10 bg-white/50 text-earth-dark shadow-sm focus:outline-none focus:ring-1 focus:ring-earth-ochre focus:border-earth-ochre sm:text-sm rounded-none transition-all" />
            </div>
            {{ if .QueryText }}
            <a href="/admin/listings{{ if .Category }}?category={{ .Category }}{{ end }}" class="flex items-center justify-center px-3 py-2 border border-l-0 border-earth-dark/10 bg-white/50 text-earth-dark/60 hover:text-earth-dark hover:bg-white/80 transition-all rounded-none" title="Clear Search">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </a>
            {{ end }}
        </form>
    </div>
</div>
{{ end }}
