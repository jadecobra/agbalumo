{{ define "listing_form_job_fields" }}
<div id="{{ .IDPrefix }}job-fields-section" class="flex flex-col gap-4 {{ if not .Visible }}hidden{{ end }}">
    <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Company
            Name</label>
        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
            <input name="company" type="text" value="{{ if .Listing }}{{ .Listing.Company }}{{ end }}"
                placeholder="e.g. Acme Inc."
                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
        </div>
    </div>
    <div class="flex flex-col gap-1.5">
        <label
            class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Compensation</label>
        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
            <input name="pay_range" type="text" value="{{ if .Listing }}{{ .Listing.PayRange }}{{ end }}"
                placeholder="e.g. $80k - $120k / Competitive"
                class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
        </div>
    </div>
    <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Skills
            Required</label>
        <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
            <textarea name="skills" rows="2" placeholder="e.g. Golang, SQL, Docker..."
                class="w-full bg-transparent border-none px-4 py-3 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50 resize-none">{{ if .Listing }}{{ .Listing.Skills }}{{ end }}</textarea>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Start
                Date</label>
            <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                <input name="job_start_date" type="datetime-local"
                    value='{{ if and .Listing (not .Listing.JobStartDate.IsZero) }}{{ .Listing.JobStartDate.Format "2006-01-02T15:04" }}{{ end }}'
                    class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-sm md:text-base outline-none transition-all placeholder:text-white/50 color-scheme-dark">
            </div>
        </div>
        <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-bold uppercase tracking-widest text-earth-clay opacity-80 ml-1">Apply
                URL</label>
            <div class="bg-earth-sand/10 border border-white/20 p-1 flex items-center">
                <input name="job_apply_url" type="text" inputmode="url"
                    value="{{ if .Listing }}{{ .Listing.JobApplyURL }}{{ end }}" placeholder="https://..."
                    class="w-full h-12 bg-transparent border-none px-4 focus:ring-0 text-white font-light text-base outline-none transition-all placeholder:text-white/50">
            </div>
        </div>
    </div>
</div>
{{ end }}
