<html class="light" lang="en" data-template-file="ui/templates/base.html">

<head>
    {{ template "head_meta" . }}
    <title>{{ block "title" . }}agbalumo{{ end }}</title>
    {{ block "extra_scripts" . }}{{ end }}
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased selection:bg-earth-accent/20">
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-earth-accent focus:text-white focus: focus:font-bold">
        Skip to main content
    </a>
    <!-- Main App Container -->
    <div class="relative flex min-h-screen w-full bg-background-light dark:bg-background-dark shadow-2xl">

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 flex flex-col min-h-screen no-scrollbar relative w-full pb-20 md:pb-0">

            {{ template "navigation" . }}

            <!-- Content -->
            {{ block "content" . }}{{ end }}

            <!-- Fruit-Themed Footer -->
            {{ template "footer" . }}
        </main>
    </div>

    <!-- Mobile Bottom Nav Removed -->



    <div id="modal-container"></div>

    {{ template "modal_create_listing.html" . }}

    <!-- Screen reader announcements for dynamic content -->
    <div id="sr-announcements" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
    <script src="/static/js/ada-metrics.js" defer></script>
</body>

</html>
