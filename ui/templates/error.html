<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - agbalumo</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/output.css">
    <!-- Auto-redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=/" />
</head>

<body
    class="bg-earth-dark text-earth-cream antialiased h-screen flex flex-col items-center justify-center text-center p-4">
    <div
        class="max-w-md w-full bg-surface-dark/40 backdrop-blur-md p-10  shadow-2xl border border-white/10 relative overflow-hidden">
        <!-- Decoration -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-earth-accent/10  blur-3xl -z-10 transform translate-x-10 -translate-y-10">
        </div>

        <div class="mb-8 flex justify-center">
            <div
                class="w-20 h-20 bg-earth-accent/20  flex items-center justify-center animate-bounce border border-earth-accent/30">
                <span class="text-5xl">🍊</span>
            </div>
        </div>
        <h1 class="text-4xl font-serif mb-4 text-earth-cream tracking-tight">Oops!</h1>
        <p class="text-sm font-medium text-earth-cream/70 mb-10 leading-relaxed">
            {{if .Message}}{{.Message}}{{else}}I'm sorry I seem to have made a mistake somewhere, returning to the home
            page...{{end}}
        </p>
        <a href="/"
            class="inline-block bg-earth-accent hover:bg-earth-accent/90 text-earth-dark font-bold px-8 py-3.5  transition-all shadow-md active:scale-[0.98]">
            Go Home Now
        </a>
    </div>
</body>

</html>
