<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login - agbalumo</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
        rel="stylesheet" />
    <link href="/static/css/output.css" rel="stylesheet" />
</head>

<body
    class="bg-earth-dark font-sans text-earth-cream antialiased h-screen flex items-center justify-center selection:bg-earth-accent/20">
    <div
        class="w-full max-w-md p-8 bg-earth-dark/95 backdrop-blur-xl border border-white/10 shadow-2xl relative overflow-hidden">
        <div class="flex flex-col items-center justify-center gap-6">
            <div class="flex flex-col items-center gap-2">
                <h1 class="text-3xl font-bold font-serif text-earth-cream tracking-tight">Admin Access</h1>
            </div>

            <form method="POST" action="/admin/login" class="flex flex-col gap-5 w-full mt-2">
                {{if .Error}}
                <div class="bg-red-900/40 text-red-300 p-3 text-sm border border-red-800 text-center font-medium">
                    {{.Error}}
                </div>
                {{end}}

                <div class="flex flex-col gap-1">
                    <input type="hidden" name="_csrf" value="{{.CSRF}}">
                    <input type="password" name="code" placeholder="Access Code" required
                        class="w-full bg-transparent border-0 border-b border-white/20 px-0 py-3 text-sm focus:ring-0 focus:border-earth-accent outline-none transition-all text-earth-cream font-medium placeholder:text-earth-cream/40">
                </div>

                <button type="submit"
                    class="h-12 w-full mt-4 bg-earth-accent text-white font-bold hover:bg-earth-accent/90 active:scale-[0.98] transition-all shadow-lg shadow-black/20">
                    Enter Dashboard
                </button>
            </form>
        </div>
    </div>
</body>

</html>
