name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Linter (GolangCI-Lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m --config=scripts/.golangci.yml

  quality_sec:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Vulnerability Check (Govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Run Tests with Coverage
        run: |
          mkdir -p @tester @data
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Enforce Coverage Threshold (90.0%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          THRESHOLD=90.0
          echo "Coverage: $COVERAGE%"
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "❌ Coverage is below $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage check passed"

  security:
    name: Custom Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Build Server
        run: go build -o server .

      - name: Start Server (Background)
        run: |
          mkdir -p @data certs
          openssl req -x509 -newkey rsa:4096 -keyout certs/key.pem -out certs/cert.pem -days 365 -nodes -subj "/CN=localhost"
          export AGBALUMO_ENV=development
          nohup ./server serve > server.log 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..20}; do
            if curl -k -s https://localhost:8443 > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting..."
            sleep 0.5
          done
          if ! curl -k -s https://localhost:8443 > /dev/null; then
            echo "Server failed to start:"
            cat server.log
            exit 1
          fi

      - name: Run Security Audit
        run: go run cmd/security-audit/main.go

  docker:
    name: Docker Build & Scan
    needs: [quality_lint, quality_sec, test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: agbalumo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'agbalumo:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Fly.io
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
