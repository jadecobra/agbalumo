name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
          cache: true

      - name: Linter (GolangCI-Lint)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          args: --timeout=5m --config=scripts/.golangci.yml

  security_static:
    name: Security Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
          cache: true

      - name: Vulnerability Check (Govulncheck)
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod

      - name: Pattern Checks (security-check.sh)
        run: sh scripts/security-check.sh --full

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run Tests with Coverage
        run: |
          mkdir -p .tester/data .tester/coverage
          go test -race -count=1 -coverprofile=.tester/coverage/coverage.out ./...
          go tool cover -func=.tester/coverage/coverage.out

      - name: Enforce Coverage Threshold
        run: |
          COVERAGE=$(go tool cover -func=.tester/coverage/coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          THRESHOLD_FILE=".agents/coverage-threshold"
          THRESHOLD=90.0
          if [ -f "$THRESHOLD_FILE" ]; then
            THRESHOLD=$(cat "$THRESHOLD_FILE")
          fi
          echo "Coverage: $COVERAGE%, Required: $THRESHOLD%"
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "❌ Coverage is below $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage check passed"

      - name: Verify Coverage Threshold Anti-Degradation
        run: |
          THRESHOLD_FILE=".agents/coverage-threshold"
          if [ ! -f "$THRESHOLD_FILE" ]; then
            echo "No threshold file found, skipping anti-degradation check"
            exit 0
          fi
          
          # Determine base branch/commit
          if [ "${{ github.event_name }}" == "pull_request" ]; then
             # For PRs, compare with the merge base of the base branch
             BASE="origin/${{ github.base_ref }}"
          else
             # For pushes, compare with the previous commit
             # git fetch depth 0 ensures we have the history
             BASE="${{ github.event.before }}"
             # Fallback if first push or no before SHA
             if [ -z "$BASE" ] || [ "$BASE" == "0000000000000000000000000000000000000000" ]; then
               BASE="HEAD^1"
             fi
          fi
          
          echo "Comparing current with BASE: $BASE"
          
          if git diff --name-only "$BASE" HEAD | grep -q "^$THRESHOLD_FILE$"; then
            OLD_THRESHOLD=$(git show "$BASE:$THRESHOLD_FILE" 2>/dev/null || echo "0.0")
            NEW_THRESHOLD=$(cat "$THRESHOLD_FILE")
            echo "New Threshold: $NEW_THRESHOLD, Old Threshold: $OLD_THRESHOLD"
            if awk "BEGIN {exit !($NEW_THRESHOLD < $OLD_THRESHOLD)}"; then
              echo "❌ Error: Coverage threshold cannot be lowered ($NEW_THRESHOLD < $OLD_THRESHOLD)"
              echo "You must write tests to maintain or improve coverage, not lower the threshold!"
              exit 1
            fi
            echo "✅ Coverage threshold anti-degradation check passed"
          else
            echo "Skipping check: $THRESHOLD_FILE not modified in this change"
          fi

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report
          path: .tester/coverage/coverage.out
          retention-days: 14

  security_dynamic:
    name: Security Dynamic Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css

      - name: Build Server
        run: go build -o server .

      - name: Start Server (Background)
        run: |
          mkdir -p .tester/data .tester/servers certs
          openssl req -x509 -newkey rsa:4096 -keyout certs/key.pem -out certs/cert.pem -days 365 -nodes -subj "/CN=localhost"
          export AGBALUMO_ENV=development
          nohup ./server serve > .tester/servers/server.log 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..20}; do
            if curl -k -s https://localhost:8443 > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting..."
            sleep 0.5
          done
          if ! curl -k -s https://localhost:8443 > /dev/null; then
            echo "Server failed to start:"
            cat .tester/servers/server.log
            exit 1
          fi

      - name: Run Dynamic Security Audit
        run: go run cmd/security-audit/main.go

  drift_checks:
    name: Drift Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
          cache: true

      - name: API Drift Check
        run: sh scripts/api-drift-check.sh --text

      - name: Template Function Drift Check
        run: sh scripts/template-func-drift-check.sh

  docker:
    name: Docker Build & Scan
    needs: [quality_lint, security_static, test, security_dynamic, drift_checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and Load Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          load: true
          tags: agbalumo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'agbalumo:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Fly.io
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
