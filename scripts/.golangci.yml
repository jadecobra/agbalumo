# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - gosec
    - bodyclose
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G301
        - G302
        - G306
        - G204
        - G304
        - G404
        - G203
        - G402
        - G101
        - G122
        - G702
        - G703
      config:
        G306: "0600" # redundant but safe

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: ".*_test\\.go"
      linters:
        - gosec
        - bodyclose
        - errcheck
    - linters:
        - gosec
      text: "G301:"
    - linters:
        - gosec
      text: "G306:"
    - linters:
        - gosec
      text: "G204:"
    - linters:
        - gosec
      text: "G304:"
    - linters:
        - gosec
      text: "G404:"
    - linters:
        - gosec
      text: "G203:"
    - linters:
        - gosec
      text: "G402:"
    - linters:
        - gosec
      text: "G101:"
