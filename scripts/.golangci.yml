# golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
