version: '3'

env:
  GOPATH: '{{if eq .ISOLATE_GO "true"}}{{.TASKFILE_DIR}}/.tester/tmp/go{{else}}{{default (printf "%s/.tester/tmp/go" .TASKFILE_DIR) .SYSTEM_GOPATH}}{{end}}'
  GOCACHE: '{{if eq .ISOLATE_GO "true"}}{{.TASKFILE_DIR}}/.tester/tmp/go/cache{{else}}{{default (printf "%s/.tester/tmp/go/cache" .TASKFILE_DIR) .SYSTEM_GOCACHE}}{{end}}'
  ISOLATE_GO: '{{default "true" .ISOLATE_GO}}'

vars:
  ISOLATE_GO: '{{default "true" .ISOLATE_GO}}'
  SYSTEM_GOPATH:
    sh: '{{if ne .ISOLATE_GO "true"}}go env GOPATH{{else}}echo .tester/tmp/go{{end}}'
  SYSTEM_GOCACHE:
    sh: '{{if ne .ISOLATE_GO "true"}}go env GOCACHE{{else}}echo .tester/tmp/gocache{{end}}'
  GOBIN: '{{if eq .ISOLATE_GO "true"}}{{.TASKFILE_DIR}}/.tester/tmp/go/bin{{else}}{{.SYSTEM_GOPATH}}/bin{{end}}'
  STAGED_GO:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.go$' || true
  STAGED_HTML:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.html$' || true
  STAGED_SEC:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.html$|\.go$|\.js$' || true
  STAGED_CMD_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/|^docs/api\.md$|^docs/openapi\.yaml$' || true
  STAGED_CLI_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/cli/|^docs/cli\.md$' || true
  STAGED_PERF:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^ui/|^internal/handler/|^internal/repository/|^scripts/' || true
  STAGED_BRAND:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.agents/rules/brand\.toon$' || true
  STAGED_AGENT:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.agents/agent\.yaml$|docs/CODING_STANDARDS\.md$' || true
  STAGED_PKGS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.go$' | xargs -I {} dirname {} | sort | uniq | sed 's|^|./|' | tr '\n' ' ' || true
  STAGED_SEC_AUDIT:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^ui/|^internal/handler/|^internal/ui/' || true
  STAGED_ALL:
    sh: git diff --cached --name-only || true
  CONTAINER: '{{default "false" .USE_CONTAINER}}'

tasks:
  lint:install:
    internal: true
    status:
      - test -f '{{.GOBIN}}/golangci-lint'
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

  lint:
    desc: Run golangci-lint on staged files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: lint:install
    cmds:
      - '{{.GOBIN}}/golangci-lint run -c scripts/.golangci.yml --new-from-rev=HEAD'

  mod-tidy:
    desc: Run go mod tidy and check for drift
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum

  build:
    desc: Run a safety build check on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - go build -o /dev/null ./...

  fmt:
    desc: Run go fmt on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - echo "{{.STAGED_GO}}" | xargs gofmt -w

  test:
    desc: Run optimized tests on staged Go packages
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
      SKIP_RACE: 'true'
    cmds:
      - bash scripts/test.sh "{{.STAGED_PKGS}}"

  test:race:
    desc: Run tests with race detector on staged Go packages
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - bash scripts/test.sh "{{.STAGED_PKGS}}"

  api-drift:
    desc: Run API drift check via harness
    silent: true
    status:
      - '[ -z "{{.STAGED_CMD_DOCS}}" ]'
    cmds:
      - ./scripts/agent-exec.sh verify api-spec

  template-drift:
    desc: Run template function drift check via harness
    silent: true
    status:
      - '[ -z "{{.STAGED_SEC}}" ]'
    cmds:
      - ./scripts/agent-exec.sh verify template-drift

  agent-drift:
    desc: Run agent rules drift check on staged agent files
    silent: true
    status:
      - '[ -z "{{.STAGED_AGENT}}" ]'
    cmds:
      - bash scripts/agent-drift-check.sh

  gitleaks:install:
    internal: true
    status:
      - test -f '{{.GOBIN}}/gitleaks'
    cmds:
      - go install github.com/zricethezav/gitleaks/v8@v8.21.2

  gitleaks:
    desc: Run gitleaks secret scan on staged files
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    deps:
      - task: gitleaks:install
    cmds:
      - bash scripts/gitleaks-scan.sh

  gosec-rationale:
    desc: Verify mandatory inline gosec justification
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - bash scripts/utils/check-gosec-rationale.sh

  security:
    desc: Run security checks on staged files
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - ./scripts/agent-exec.sh verify security-static "{{.STAGED_ALL}}"

  vulncheck:install:
    internal: true
    status:
      - test -f '{{.GOBIN}}/govulncheck'
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@latest

  vulncheck:
    desc: Run govulncheck vulnerability scan on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: vulncheck:install
    cmds:
      - '{{.GOBIN}}/govulncheck ./...'

  gocognit:install:
    desc: Install gocognit (internal)
    status:
      - test -f '{{.GOBIN}}/gocognit'
    cmds:
      - go install github.com/uudashr/gocognit/cmd/gocognit@latest

  dupl:install:
    desc: Install dupl (internal)
    status:
      - test -f '{{.GOBIN}}/dupl'
    cmds:
      - go install github.com/mibk/dupl@latest

  complexity:
    desc: Run cognitive complexity check on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: gocognit:install
    cmds:
      - '{{.GOBIN}}/gocognit -over 12 {{.STAGED_GO}}'

  perf:
    desc: Run performance audit on staged performance-sensitive files
    silent: true
    status:
      - '[ -z "{{.STAGED_PERF}}" ]'
    cmds:
      - sh scripts/performance-audit.sh

  brand:
    desc: Generate brand juice from staged brand files
    silent: true
    status:
      - '[ -z "{{.STAGED_BRAND}}" ]'
    cmds:
      - bash scripts/generate-juice.sh

  threshold:
    desc: Verify coverage threshold anti-degradation
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    cmds:
      - bash scripts/ci/check-coverage-drift.sh --local

  gates:
    desc: Check workflow gate enforcement
    silent: true
    cmds:
      - bash scripts/check-gates.sh

  ci-tools:
    desc: Verify CI toolset availability
    silent: true
    cmds:
      - bash scripts/verify-ci-tools.sh

  ignored-files:
    desc: Check for ignored files staged for commit
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    cmds:
      - bash scripts/check-ignored.sh

  security-audit:
    desc: Run dynamic security audit (DAST) on demand or UI changes
    status:
      - '[ -z "{{.STAGED_SEC_AUDIT}}" ]'
    env:
      APP_URL: '{{default "https://192.168.68.69.nip.io:8443" .APP_URL}}'
    cmds:
      - go run cmd/security-audit/main.go

  watch:
    desc: Watch Go files and run fast checks + tests on change
    cmds:
      - task: _pre-commit-fast
      - task: test
    watch: true
    sources:
      - '**/*.go'
      - 'Taskfile.yml'

  sandbox:setup:
    desc: Initialize Sandboxed Workspace (use if hitting macOS permission errors)
    cmds:
      - bash scripts/sandbox-setup.sh


  ci:lint:
    desc: Run full lint on the entire codebase
    deps:
      - task: lint:install
    cmds:
      - '{{.GOBIN}}/golangci-lint run -c scripts/.golangci.yml'

  ci:test:
    desc: Run full test suite with coverage and race detector (strict)
    env:
      STRICT_MODE: 'true'
    cmds:
      - bash scripts/test.sh

  ci:security:
    desc: Run full security audit
    deps:
      - task: ci:vulncheck
    cmds:
      - ./scripts/agent-exec.sh verify security-static --text

  ci:vulncheck:
    desc: Run full govulncheck vulnerability scan
    deps:
      - task: vulncheck:install
    cmds:
      - '{{.GOBIN}}/govulncheck ./...'

  ci:api-drift:
    desc: Run full API drift check via harness
    cmds:
      - ./scripts/agent-exec.sh verify api-spec --text

  ci:template-drift:
    desc: Run full template function drift check via harness
    cmds:
      - ./scripts/agent-exec.sh verify template-drift --text

  ci:agent-drift:
    desc: Run full agent rules drift check
    cmds:
      - bash scripts/agent-drift-check.sh

  ci:build:
    desc: Run full safety build
    cmds:
      - go build -o /dev/null ./...

  ci:
    desc: Run all CI checks (lint, test, security, build, drift, audit)
    deps:
      - task: ci:lint
      - task: ci:test
      - task: ci:security
      - task: ci:build
      - task: ci:api-drift
      - task: ci:template-drift
      - task: ci:agent-drift
      - task: security-audit

  pre-commit:
    desc: Run all pre-commit gates (Fast Sequential -> Heavy Parallel)
    cmds:
      - task: gates
      - task: _pre-commit-fast
      - task: _pre-commit-heavy

  _pre-commit-fast:
    internal: true
    cmds:
      - task: mod-tidy
      - task: fmt
      - task: lint
      - task: build

  _pre-commit-heavy:
    internal: true
    deps:
      - test
      - api-drift
      - template-drift
      - agent-drift
      - vulncheck
      - gitleaks
      - gosec-rationale
      - security
      - perf
      - brand
      - threshold
      - ci-tools
      - ignored-files
