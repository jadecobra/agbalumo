version: '3'

vars:
  STAGED_GO:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.go$' || true
  STAGED_HTML:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.html$' || true
  STAGED_SEC:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.html$|\.go$|\.js$' || true
  STAGED_CMD_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/|^docs/api\.md$|^docs/openapi\.yaml$' || true
  STAGED_CLI_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/cli/|^docs/cli\.md$' || true
  STAGED_PERF:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^ui/|^internal/handler/|^internal/repository/|^scripts/' || true
  STAGED_ALL:
    sh: git diff --cached --name-only || true
  CONTAINER: '{{default "false" .USE_CONTAINER}}'
  GOBIN:
    sh: go env GOPATH | sed 's|$|/bin|'
  STAGED_PKGS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.go$' | xargs -I {} dirname {} | sort | uniq | sed 's|^|./|' | tr '\n' ' ' || true
  STAGED_SEC_AUDIT:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^ui/|^internal/handler/|^internal/ui/' || true
  STAGED_ALL:
    sh: git diff --cached --name-only || true
  CONTAINER: '{{default "false" .USE_CONTAINER}}'

tasks:
  lint:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/golangci-lint
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

  lint:staged:
    desc: Run golangci-lint on staged files (fast)
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: lint:install
    cmds:
      - '{{.GOBIN}}/golangci-lint run -c scripts/.golangci.yml --new-from-rev=HEAD'

  lint:
    desc: Run full lint on the entire codebase
    deps:
      - task: ci:lint
    cmds:
      - echo "Full project lint completed successfully."

  mod-tidy:
    desc: Run go mod tidy and check for drift
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum

  build:
    desc: Run a safety build check on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - go build -o /dev/null ./...

  fmt:
    desc: Run go fmt on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    cmds:
      - echo "{{.STAGED_GO}}" | xargs gofmt -w

  test:
    desc: Run optimized tests on staged Go packages
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
      SKIP_RACE: 'true'
    cmds:
      - go test -count=1 ./...

  test:race:
    desc: Run tests with race detector on staged Go packages
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - go test -count=1 ./...

  api-drift:
    desc: Detect API drift (Code vs OpenAPI vs MD)
    silent: true
    status:
      - '[ -z "{{.STAGED_CMD_DOCS}}" ]'
    cmds:
      - go run cmd/verify/main.go api-spec

  template-drift:
    desc: Detect template function drift
    silent: true
    status:
      - '[ -z "{{.STAGED_SEC}}" ]'
    cmds:
      - go run cmd/verify/main.go template-drift

  cost:
    desc: Calculate context cost (advisory)
    cmds:
      - go run cmd/verify/main.go context-cost

  gitleaks:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/gitleaks
    cmds:
      - go install github.com/zricethezav/gitleaks/v8@v8.21.2

  gitleaks:
    desc: Run gitleaks secret scan on staged files
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    deps:
      - task: gitleaks:install
    cmds:
      - '{{.GOBIN}}/gitleaks protect --staged --verbose --redact'

  gosec-rationale:
    desc: Verify mandatory inline gosec justification
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - bash scripts/utils/check-gosec-rationale.sh

  security:
    desc: Run security checks on staged files
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    env:
      USE_CONTAINER: '{{.CONTAINER}}'
    cmds:
      - go run cmd/verify/main.go api-spec
      - go run cmd/verify/main.go template-drift
      - go run cmd/verify/main.go coverage

  vulncheck:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/govulncheck
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

  vulncheck:
    desc: Run govulncheck vulnerability scan on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: vulncheck:install
    cmds:
      - '{{.GOBIN}}/govulncheck ./...'

  gocognit:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/gocognit
    cmds:
      - go install github.com/uudashr/gocognit/cmd/gocognit@v1.0.1

  dupl:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/dupl
    cmds:
      - go install github.com/mibk/dupl@v1.0.0

  goconst:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/goconst
    cmds:
      - go install github.com/jgautheron/goconst/cmd/goconst@v1.7.1

  fieldalignment:install:
    internal: true
    status:
      - test -f {{.GOBIN}}/fieldalignment
    cmds:
      - go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@v0.30.0

  critique:
    desc: Run ChiefCritic robustness audit
    deps:
      - task: gocognit:install
      - task: dupl:install
      - task: goconst:install
      - task: fieldalignment:install
    cmds:
      - bash scripts/critique.sh {{.CLI_ARGS}}

  complexity:
    desc: Run cognitive complexity check on staged Go files
    silent: true
    status:
      - '[ -z "{{.STAGED_GO}}" ]'
    deps:
      - task: gocognit:install
    cmds:
      - '{{.GOBIN}}/gocognit -over 12 {{.STAGED_GO}}'

  perf:
    desc: Run performance audit on staged performance-sensitive files
    silent: true
    status:
      - '[ -z "{{.STAGED_PERF}}" ]'
    cmds:
      - sh scripts/performance-audit.sh

  brand:
    desc: Generate brand juice from staged brand files
    silent: true
    status:
      - '[ -z "{{.STAGED_BRAND}}" ]'
    cmds:
      - bash scripts/generate-juice.sh

  threshold:
    desc: Verify coverage threshold anti-degradation
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    cmds:
      - go run cmd/verify/main.go coverage

  gates:
    desc: Check workflow gate enforcement
    silent: true
    cmds:
      - bash scripts/check-gates.sh

  ci-tools:
    desc: Verify CI toolset availability
    silent: true
    cmds:
      - bash scripts/verify-ci-tools.sh

  ignored-files:
    desc: Check for ignored files staged for commit
    silent: true
    status:
      - '[ -z "{{.STAGED_ALL}}" ]'
    cmds:
      - bash scripts/check-ignored.sh

  security-audit:
    desc: Run dynamic security audit (DAST) on demand or UI changes
    status:
      - '[ -z "{{.STAGED_SEC_AUDIT}}" ]'
    env:
      APP_URL: '{{default "https://192.168.68.69.nip.io:8443" .APP_URL}}'
    deps:
      - task: vulncheck:install
    cmds:
      - go run cmd/verify/main.go audit

  ci:docker-scan:
    desc: Build local Docker image and scan for vulnerabilities (Trivy)
    vars:
      IMAGE_NAME: 'agbalumo-local'
    cmds:
      - docker build -t {{.IMAGE_NAME}} .
      - |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v "$(pwd)/.cache/trivy:/root/.cache/" \
          ghcr.io/aquasecurity/trivy:latest \
          image \
          --exit-code 1 \
          --ignore-unfixed \
          --vuln-type os,library \
          --severity CRITICAL,HIGH \
          {{.IMAGE_NAME}}

  watch:
    desc: Watch Go files and run fast checks + tests on change
    cmds:
      - task: _pre-commit-fast
      - task: test
    watch: true
    sources:
      - '**/*.go'
      - 'Taskfile.yml'

  sandbox:setup:
    desc: Initialize Sandboxed Workspace (use if hitting macOS permission errors)
    cmds:
      - bash scripts/sandbox-setup.sh


  ci:lint:
    desc: Run full lint on the entire codebase
    deps:
      - task: lint:install
    cmds:
      - '{{.GOBIN}}/golangci-lint run -c scripts/.golangci.yml'

  ci:test:
    desc: Run full test suite with coverage and race detector (strict)
    env:
      STRICT_MODE: 'true'
    cmds:
      - go test -count=1 ./...

  ci:security:
    desc: Run full security audit
    deps:
      - task: ci:vulncheck
    cmds:
      - go run cmd/verify/main.go coverage

  ci:vulncheck:
    desc: Run full govulncheck vulnerability scan
    deps:
      - task: vulncheck:install
    cmds:
      - '{{.GOBIN}}/govulncheck ./...'

  ci:api-drift:
    desc: Run full API drift check
    cmds:
      - go run cmd/verify/main.go api-spec

  ci:template-drift:
    desc: Run full template function drift check
    cmds:
      - go run cmd/verify/main.go template-drift
  ci:verify-shas:
    desc: Verify all GitHub Action SHAs are pinned
    cmds:
      - bash scripts/ci/verify-action-shas.sh

  ci:build:
    desc: Run full safety build
    cmds:
      - go build -o /dev/null ./...

  ci:
    desc: Run all CI checks (lint, test, security, build, drift, audit)
    deps:
      - task: ci:lint
      - task: ci:test
      - task: ci:security
      - task: ci:build
      - task: ci:api-drift
      - task: ci:template-drift
      - task: ci:verify-shas
      - task: ci:docker-scan
      - task: security-audit

  pre-commit:
    desc: Run all pre-commit gates (Fast Sequential -> Heavy Parallel)
    cmds:
      - task: _pre-commit-fast
      - task: _pre-commit-heavy

  _pre-commit-fast:
    internal: true
    cmds:
      - task: mod-tidy
      - task: fmt
      - task: lint:staged
      - task: ci:build

  _pre-commit-heavy:
    internal: true
    deps:
      - ci:test
      - api-drift
      - template-drift
      - vulncheck
      - gitleaks
      - gosec-rationale
      - security
      - perf
      - brand
      - threshold
      - ci-tools
      - ignored-files
