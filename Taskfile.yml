version: '3'

vars:
  STAGED_GO:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.go$' || true
  STAGED_HTML:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep '\.html$' || true
  STAGED_SEC:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.html$|\.go$|\.js$' || true
  STAGED_CMD_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/|^docs/api\.md$|^docs/openapi\.yaml$' || true
  STAGED_CLI_DOCS:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^cmd/cli/|^docs/cli\.md$' || true
  STAGED_PERF:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '^ui/|^internal/handler/|^internal/repository/|^scripts/' || true
  STAGED_BRAND:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.agents/rules/brand\.toon$' || true
  STAGED_AGENT:
    sh: git diff --cached --name-only --diff-filter=ACMR | grep -E '\.agents/agent\.yaml$|docs/CODING_STANDARDS\.md$' || true
  STAGED_ALL:
    sh: git diff --cached --name-only || true

tasks:
  lint:
    desc: Run golangci-lint on staged files
    preconditions:
      - sh: '[ -n "{{.STAGED_GO}}" ]'
        msg: "No Go files staged for linting. Skipping."
    cmds:
      - golangci-lint run -c scripts/.golangci.yml --new-from-rev=HEAD

  mod-tidy:
    desc: Run go mod tidy and check for drift
    preconditions:
      - sh: '[ -n "{{.STAGED_GO}}" ]'
        msg: "No Go files staged. Skipping mod-tidy."
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum

  build:
    desc: Run a safety build check on staged Go files
    preconditions:
      - sh: '[ -n "{{.STAGED_GO}}" ]'
        msg: "No Go files staged for build check. Skipping."
    cmds:
      - go build -o /dev/null .

  test:
    desc: Run tests on staged Go files
    preconditions:
      - sh: '[ -n "{{.STAGED_GO}}" ]'
        msg: "No Go files staged for tests. Skipping."
    cmds:
      - bash scripts/test.sh

  api-drift:
    desc: Run API drift check on staged command docs
    preconditions:
      - sh: '[ -n "{{.STAGED_CMD_DOCS}}" ]'
        msg: "No API docs or command files staged. Skipping api-drift."
    cmds:
      - bash scripts/api-drift-check.sh

  template-drift:
    desc: Run template function drift check on staged security-sensitive files
    preconditions:
      - sh: '[ -n "{{.STAGED_SEC}}" ]'
        msg: "No HTML, Go, or JS files staged. Skipping template-drift."
    cmds:
      - bash scripts/template-func-drift-check.sh

  agent-drift:
    desc: Run agent rules drift check on staged agent files
    preconditions:
      - sh: '[ -n "{{.STAGED_AGENT}}" ]'
        msg: "No agent rules or coding standards staged. Skipping agent-drift."
    cmds:
      - bash scripts/agent-drift-check.sh

  gitleaks:
    desc: Run gitleaks secret scan on staged files
    preconditions:
      - sh: '[ -n "{{.STAGED_ALL}}" ]'
        msg: "No files staged for secret scan. Skipping."
    cmds:
      - bash scripts/gitleaks-scan.sh

  gosec-rationale:
    desc: Verify mandatory inline gosec justification
    preconditions:
      - sh: '[ -n "{{.STAGED_ALL}}" ]'
        msg: "No files staged for gosec rationale check. Skipping."
    cmds:
      - bash scripts/utils/check-gosec-rationale.sh

  security:
    desc: Run security checks on staged files
    preconditions:
      - sh: '[ -n "{{.STAGED_ALL}}" ]'
        msg: "No files staged for security checks. Skipping."
    cmds:
      - sh scripts/security-check.sh


  perf:
    desc: Run performance audit on staged performance-sensitive files
    preconditions:
      - sh: '[ -n "{{.STAGED_PERF}}" ]'
        msg: "No performance-sensitive files staged. Skipping performance-audit."
    cmds:
      - sh scripts/performance-audit.sh

  brand:
    desc: Generate brand juice from staged brand files
    preconditions:
      - sh: '[ -n "{{.STAGED_BRAND}}" ]'
        msg: "No brand files staged. Skipping brand juice generation."
    cmds:
      - bash scripts/generate-juice.sh

  threshold:
    desc: Verify coverage threshold anti-degradation
    preconditions:
      - sh: '[ -n "{{.STAGED_ALL}}" ]'
        msg: "No files staged. Skipping threshold check."
    cmds:
      - |
        THRESHOLD_FILE=".agents/coverage-threshold"
        if [ -f "$THRESHOLD_FILE" ] && git ls-files --error-unmatch "$THRESHOLD_FILE" >/dev/null 2>&1; then
            if git diff --cached --name-only | grep -q "^$THRESHOLD_FILE$"; then
                OLD_THRESHOLD=$(git show HEAD:$THRESHOLD_FILE 2>/dev/null || echo "0.0")
                NEW_THRESHOLD=$(cat "$THRESHOLD_FILE")
                if awk "BEGIN {exit !($NEW_THRESHOLD < $OLD_THRESHOLD)}"; then
                    echo "Error: Coverage threshold cannot be lowered ($NEW_THRESHOLD < $OLD_THRESHOLD)"
                    exit 1
                fi
            fi
        fi

  gates:
    desc: Check workflow gate enforcement
    cmds:
      - bash scripts/check-gates.sh

  ci-tools:
    desc: Verify CI toolset availability
    cmds:
      - bash scripts/verify-ci-tools.sh

  ignored-files:
    desc: Check for ignored files staged for commit
    preconditions:
      - sh: '[ -n "{{.STAGED_ALL}}" ]'
        msg: "No files staged. Skipping ignored-files check."
    cmds:
      - |
        STAGED_NEW_OR_MOD=$(git diff --cached --name-only --diff-filter=ACMR || true)
        if [ -n "$STAGED_NEW_OR_MOD" ]; then
            IGNORED_STAGED=$(echo "$STAGED_NEW_OR_MOD" | git check-ignore --no-index --stdin || true)
            if [ -n "$IGNORED_STAGED" ]; then
                echo "Error: The following ignored files are staged for commit:"
                echo "$IGNORED_STAGED" | sed 's/^/    /'
                exit 1
            fi
        fi
